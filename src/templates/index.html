<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalla de bandas - 25/5/26</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="contenedor-principal">
        <div class="header-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>
        <h1 class="titulo-bunker">¿Quién gana?</h1>

        <div class="card-batalla" data-batalla="1">
            <h2 class="titulo-batalla">Batalla 1</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="gilda">
                        <span>Gilda manson</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="dinorah">
                        <span>Dinorah</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar en esta batalla</button>
            </form>
        </div>
        
        <div class="card-batalla" data-batalla="2">
            <h2 class="titulo-batalla">Batalla 2</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="ficc">
                        <span>Ficciones</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="ntme">
                        <span>No te me enojes</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar en esta batalla</button>
            </form>
        </div>

        <div class="card-batalla" data-batalla="3">
            <h2 class="titulo-batalla">Batalla 3</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="marchi">
                        <span>Marchitorial</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="cartas">
                        <span>Cartas a mí</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar en esta batalla</button>
            </form>
        </div>
    </div>
    
    <div id="cartel-alerta" class="toast"></div>

    <script src="../static/scripts.js"></script>
</body>
</html>
