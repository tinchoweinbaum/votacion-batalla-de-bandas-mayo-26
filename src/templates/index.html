<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación del Festival</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="contenedor-principal">
        <div class="header-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>
        <h1 class="titulo-bunker">¿Quién gana?</h1>

        <div class="card-batalla">
            <h2 class="titulo-batalla">Batalla 1</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <input type="hidden" name="id_dispositivo" value="celular_test_1">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="gilda" required>
                        <span>Gilda manson</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="dinorah">
                        <span>Dinorah</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar</button>
            </form>
        </div>

        <div class="card-batalla">
            <h2 class="titulo-batalla">Batalla 2</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <input type="hidden" name="id_dispositivo" value="celular_test_1">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="ficc" required>
                        <span>Ficciones</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="ntme">
                        <span>No te me enojes</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar</button>
            </form>
        </div>

        <div class="card-batalla">
            <h2 class="titulo-batalla">Batalla 3</h2>
            <form action="/votar" method="POST" class="formulario-voto">
                <input type="hidden" name="id_dispositivo" value="celular_test_1">
                <div class="opciones">
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="marchi" required>
                        <span>Marchitorial</span>
                    </label>
                    <label class="opcion">
                        <input type="radio" name="id_banda" value="cartas">
                        <span>Cartas a mí</span>
                    </label>
                </div>
                <button type="submit" class="btn-votar">Votar</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
