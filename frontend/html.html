<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación de Bandas</title>
</head>
<body>

    <main>
        <h2>¿Quién gana esta batalla?</h2>
        
        <form action="/votar" method="POST">
            <div>
                <input type="radio" id="banda-ficciones" name="banda" value="Ficciones" checked>
                <label for="banda-ficciones">Ficciones</label>
            </div>
            
            <div>
                <input type="radio" id="banda-ntme" name="banda" value="NTME">
                <label for="banda-ntme">NTME</label>
            </div>
            
            <button type="submit">Enviar Voto</button>
        </form>
    </main>

</body>
</html>
